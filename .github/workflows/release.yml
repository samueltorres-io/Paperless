name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'release'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
            ext: ''
          - os: ubuntu-22.04-arm
            rid: linux-arm64
            archive: tar.gz
            ext: ''
          - os: macos-13
            rid: osx-x64
            archive: tar.gz
            ext: ''
          - os: macos-latest
            rid: osx-arm64
            archive: tar.gz
            ext: ''
          - os: windows-latest
            rid: win-x64
            archive: zip
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore -r ${{ matrix.rid }}

      - name: Publish (AOT, single-file, self-contained)
        run: >
          dotnet publish
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=true
          -p:StripSymbols=true
          -p:InvariantGlobalization=false
          -o ./publish

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd publish
          if [ -f "Paperless" ]; then mv Paperless paperless; fi
          chmod +x paperless
          tar -czf ../paperless-${{ matrix.rid }}.tar.gz \
              paperless \
              appsettings.json \
              skill.md
          cd ..
          sha256sum paperless-${{ matrix.rid }}.tar.gz > paperless-${{ matrix.rid }}.tar.gz.sha256

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd publish
          if (Test-Path "Paperless.exe") { Rename-Item "Paperless.exe" "paperless.exe" }
          Compress-Archive -Path paperless.exe, appsettings.json, skill.md `
                           -DestinationPath ../paperless-${{ matrix.rid }}.zip
          cd ..
          $hash = Get-FileHash "paperless-${{ matrix.rid }}.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  paperless-${{ matrix.rid }}.zip" | Out-File -Encoding ascii "paperless-${{ matrix.rid }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperless-${{ matrix.rid }}
          path: |
            paperless-${{ matrix.rid }}.*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'paperless-*.tar.gz*' -o -name 'paperless-*.zip*' \) -exec cp {} release/ \;
          cp install/install.sh release/install.sh
          cp install/install.ps1 release/install.ps1
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: release/*
          draft: false
          prerelease: false