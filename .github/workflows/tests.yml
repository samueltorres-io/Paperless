name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Tests/Paperless.Tests.csproj

      - name: Build
        run: dotnet build Tests/Paperless.Tests.csproj --no-restore

      - name: Test
        run: dotnet test Tests/Paperless.Tests.csproj --no-build